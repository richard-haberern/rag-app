name: Python application

on:
  push:
  pull_request:

permissions:
  contents: read

# A new push to the same ref cancels an outdated in-progress run (cost saver;
# does not change which events trigger CI).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
    - name: Load CI environment
      # Settings (config.py) reads the process environment; export .env.ci so every
      # later step (pytest) sees DB_*_TEST etc. File is clean KEY=VALUE lines.
      run: cat .env.ci >> "$GITHUB_ENV"
    - name: Set up uv
      # Installs uv and caches the uv download/wheel cache keyed on uv.lock.
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true
        cache-dependency-glob: "uv.lock"
        # Pin the interpreter uv provisions (requires-python only floors it at 3.12).
        python-version: "3.12"
    - name: Install dependencies
      # --frozen: fail if uv.lock is out of date rather than silently re-resolving,
      # so CI installs exactly the locked versions (dev group included by default).
      run: uv sync --frozen
    - name: Start services
      # --wait blocks until pg is healthy. Must target pg explicitly: pg-init is also in
      # the test profile but is a one-shot job (restart: "no") that exits 0 on success --
      # left implicit, `up --wait` would include it and fail on that exit.
      run: docker compose --env-file .env.ci --profile test up -d --wait pg
    - name: Bootstrap Postgres (rag_test db + app_user role)
      # Idempotent (scripts/bootstrap-pg.sh) -- explicit step rather than relying on
      # docker-entrypoint-initdb.d, which only fires on a brand-new volume.
      run: docker compose --env-file .env.ci run --rm pg-init
    - name: Apply schema to rag_test (alembic upgrade head)
      # Same command the app itself runs before serving (see docker-compose.yaml's api
      # service / README) -- test schema (incl. RLS/policies/grants) now matches prod
      # exactly instead of a separate create_all path.
      run: DATABASE_URL="postgresql+asyncpg://raguser:testpassword@localhost:5432/rag_test" uv run alembic upgrade head
    - name: Lint with ruff
      run: |
        uv run ruff check ./src
    - name: Type checks with mypy
      run: |
        uv run mypy ./src
    - name: Test with pytest
      run: |
        uv run pytest
    - name: Service logs and cleanup
      if: always()
      run: |
        docker compose --profile test logs
        docker compose --profile test down -v
