services:
  pg:
    image: pgvector/pgvector:pg16
    profiles: ["app", "test"]
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ragdb
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5432:5432"   # host-run pytest (profile test) reaches rag_test at localhost:5432
    healthcheck:
      # Same user/db as POSTGRES_* and the api's DATABASE_URL below.
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    profiles: ["app"]
    depends_on:
      pg:
        condition: service_healthy   # api won't start until pg_isready passes
    environment:
      # host is `pg` (the compose service name), not localhost.
      DATABASE_URL: postgresql+asyncpg://raguser:${POSTGRES_PASSWORD:-}@pg:5432/ragdb
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8080:8000"

volumes:
  pgdata:
