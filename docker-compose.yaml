services:
  pg:
    image: pgvector/pgvector:pg16
    profiles: ["app", "test"]
    environment:
      POSTGRES_USER: raguser
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-}
      POSTGRES_DB: ragdb
    volumes:
      # data that persists the -v
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"   # host-run pytest (profile test) reaches rag_test at localhost:5432
    healthcheck:
      # Same user/db as POSTGRES_* and the api's DATABASE_URL below.
      test: ["CMD-SHELL", "pg_isready -U raguser -d ragdb"]
      interval: 5s
      timeout: 5s
      retries: 5

  # One-shot, idempotent: creates the rag_test database and the app_user role if either
  # is missing. Unlike docker-entrypoint-initdb.d scripts (which only ever run once, on a
  # brand-new pg volume), this is safe to re-run against any volume -- run it explicitly
  # with `docker compose run --rm pg-init` after `pg` is up, before `alembic upgrade head`
  # / the app / the test suite. See scripts/bootstrap-pg.sh.
  pg-init:
    image: pgvector/pgvector:pg16
    profiles: ["app", "test"]
    depends_on:
      pg:
        condition: service_healthy
    environment:
      PGHOST: pg
      PGUSER: raguser
      PGPASSWORD: ${POSTGRES_PASSWORD:-}
      PGDATABASE: ragdb
      # Password for the least-privilege app_user role bootstrap-pg.sh creates.
      APP_USER_PASSWORD: ${APP_USER_PASSWORD:-}
    volumes:
      - ./scripts/bootstrap-pg.sh:/bootstrap-pg.sh:ro
    entrypoint: ["bash", "/bootstrap-pg.sh"]
    restart: "no"

  api:
    build: .
    profiles: ["app"]
    depends_on:
      pg:
        condition: service_healthy   # api won't start until pg_isready passes
    environment:
      # host is `pg` (the compose service name), not localhost.
      # APP_DATABASE_URL = the least-privilege app_user role: this is what the running app
      # connects as, so RLS is enforced. DATABASE_URL = the owner (raguser), used ONLY to run
      # `alembic upgrade head` (e.g. `docker compose run --rm api alembic upgrade head`), which
      # must happen before the app can serve (no init_db-on-boot anymore).
      APP_DATABASE_URL: postgresql+asyncpg://app_user:${APP_USER_PASSWORD:-}@pg:5432/ragdb
      DATABASE_URL: postgresql+asyncpg://raguser:${POSTGRES_PASSWORD:-}@pg:5432/ragdb
      LLM_API_KEY: ${LLM_API_KEY:-}
    ports:
      - "8080:8000"

volumes:
  pgdata:
