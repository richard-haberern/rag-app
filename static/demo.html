<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Groundwork — app</title>
  <meta name="description" content="Groundwork: ask natural-language questions grounded in your own documents. Sign in, browse anonymously, ingest text and get answers backed by vector retrieval.">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <header class="site-header wrap">
    <a class="brand" href="/">Groundwork</a>
    <nav class="site-nav" aria-label="Site">
      <a href="/">Home</a>
      <a href="/docs">API docs</a>
    </nav>
  </header>

  <div class="toast-wrap wrap"><div id="toast" class="toast" role="status" aria-live="polite" hidden></div></div>

  <main id="app" class="wrap">
    <!-- app.js mounts one of: logged-out / anonymous / registered / iframe-warning -->
    <p class="status loading" role="status" aria-live="polite">
      <span class="spinner" aria-hidden="true"></span>Loading…
    </p>
  </main>

  <footer class="site-footer">
    <div class="wrap">Groundwork · <a href="/docs">OpenAPI docs</a></div>
  </footer>

  <script src="/api.js"></script>
  <script src="/app.js"></script>
</body>
</html>
